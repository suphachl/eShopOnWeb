name: Container Workflow
on: workflow_dispatch
 
env:
  ACR_LOGIN_SERVER: aistraining.azurecr.io
  TAG_NAME: eshoponweb-rg-016:1.0.0
  IMAGE_NAME: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.TAG_NAME }}
  RESOURCE_GROUP: rg-016
jobs:
  build-container:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkput source code
        uses: actions/checkout@v7.0.0
 
      - name: ACR Login
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD}}
 
      - name: Build and Push Image
        run: |
          docker build -f src/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}

  deploy-to-aks:
        needs: build-container
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v7.0.0
          - uses: azure/aks-set-context@v1
            with:
             creds: ${{ secrets.AZURE_CREDENTIALS }}
             resource-group: ${{ env.RESOURCE_GROUP }}
             cluster-name: ${{ env.CLUSTER_NAME }}
           -uses: Azure/k8s-deploy@v1
            


           
